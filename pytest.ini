[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    database: requires a live Supabase/PostgreSQL connection
    network: makes real HTTP or third-party API calls (yfinance, EDGAR, etc.)
    integration: requires external services (network or database); use for broad smoke tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
