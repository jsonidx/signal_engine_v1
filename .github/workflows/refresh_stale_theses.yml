name: Refresh Stale Theses + Hot Entry Alerts (daily)

# Runs every day at 04:30 Berlin time (02:30 UTC) — after the daily --skip-ai pipeline.
# 1. Re-runs AI analysis for theses older than 7 days → Telegram diff
# 2. Checks all tickers for hot entry (AI zone ∩ live zone) → Telegram alert

on:
  schedule:
    - cron: '30 2 * * 1-6'   # 04:30 Berlin (CEST UTC+2), Mon–Sat
  workflow_dispatch:
    inputs:
      days:
        description: 'Stale threshold in days'
        required: false
        default: '7'
      dry_run:
        description: 'Dry run (no AI calls or Telegram sends)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-and-alert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh stale theses and notify
        env:
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          XAI_API_KEY:          ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          CMD="python3 scripts/refresh_stale_and_notify.py --days $DAYS"
          if [ "$DRY_RUN" = "true" ]; then CMD="$CMD --dry-run"; fi

          echo "Running: $CMD"
          $CMD

      - name: Hot entry zone check and notify
        env:
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          CMD="python3 scripts/notify_hot_entry.py"
          if [ "$DRY_RUN" = "true" ]; then CMD="$CMD --dry-run"; fi

          echo "Running: $CMD"
          $CMD
