name: Daily Signal Pipeline (no AI cost)

on:
  schedule:
    - cron: '17 1 * * 1-6'   # 03:17 Berlin (CEST, UTC+2) = 02:00 UTC
  workflow_dispatch:
    inputs:
      skip_ai:
        description: 'Skip AI synthesis (--skip-ai, €0.00)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

# Opt into Node.js 24 now to avoid the June 2026 forced migration.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        run: echo "PIPELINE_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set cache date key
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache iShares constituent files
        uses: actions/cache@v4
        with:
          path: data/universe_cache
          key: universe-cache-${{ steps.date.outputs.today }}
          restore-keys: |
            universe-cache-

      - name: Run master pipeline
        run: |
          set -o pipefail
          mkdir -p logs data
          SKIP_AI="${{ github.event.inputs.skip_ai || 'true' }}"
          if [ "$SKIP_AI" = "true" ]; then
            echo "Running with --skip-ai (€0.00)"
            bash run_master.sh --skip-ai 2>&1 | tee logs/pipeline_report.txt
          else
            echo "Running full pipeline with AI synthesis (~€0.03)"
            bash run_master.sh 2>&1 | tee logs/pipeline_report.txt
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload report to Supabase
        if: always()
        run: python3 scripts/upload_pipeline_report.py --run-id "${{ github.run_id }}" --conclusion "${{ job.status }}" --workflow "Daily Signal Pipeline"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Notify Telegram
        if: always()
        run: |
          SKIP_AI="${{ github.event.inputs.skip_ai || 'true' }}"
          SKIP_FLAG=""
          if [ "$SKIP_AI" = "true" ]; then SKIP_FLAG="--skip-ai"; fi
          python3 scripts/notify_pipeline_result.py \
            --status "${{ job.status }}" \
            --workflow "Daily Signal Pipeline" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --duration-min "$(echo "scale=1; ($(date +%s) - ${PIPELINE_START:-$(date +%s)}) / 60" | bc)" \
            $SKIP_FLAG
        env:
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
