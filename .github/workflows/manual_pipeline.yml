name: Manual Signal Pipeline (with AI cost)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Run full pipeline with AI synthesis — estimated cost ~€0.03–0.05 per run (5 Grok API calls via xAI)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set cache date key
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache iShares constituent files
        uses: actions/cache@v4
        with:
          path: data/universe_cache
          key: universe-cache-${{ steps.date.outputs.today }}
          restore-keys: |
            universe-cache-

      - name: Run master pipeline
        run: |
          echo "Running full pipeline with AI synthesis (~€0.03)"
          bash run_master.sh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
