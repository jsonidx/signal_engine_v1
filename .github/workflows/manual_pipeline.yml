name: Manual Signal Pipeline (with AI cost)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Run full pipeline with AI synthesis — estimated cost ~€0.03–0.05 per run (5 Grok API calls via xAI)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        run: echo "PIPELINE_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set cache date key
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache iShares constituent files
        uses: actions/cache@v4
        with:
          path: data/universe_cache
          key: universe-cache-${{ steps.date.outputs.today }}
          restore-keys: |
            universe-cache-

      - name: Run master pipeline
        run: |
          set -o pipefail
          mkdir -p logs
          echo "Running full pipeline with AI synthesis (~€0.03)"
          bash run_master.sh 2>&1 | tee logs/pipeline_report.txt
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload report to Supabase
        if: always()
        run: python3 scripts/upload_pipeline_report.py --run-id "${{ github.run_id }}" --conclusion "${{ job.status }}" --workflow "Manual Signal Pipeline (AI)"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Notify Telegram
        if: always()
        run: |
          python3 scripts/notify_pipeline_result.py \
            --status "${{ job.status }}" \
            --workflow "Manual Signal Pipeline (AI)" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --duration-min "$(echo "scale=1; ($(date +%s) - ${PIPELINE_START:-$(date +%s)}) / 60" | bc)"
        env:
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
