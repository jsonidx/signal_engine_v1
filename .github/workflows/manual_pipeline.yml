name: Daily Signal Pipeline (with AI cost)

on:
  # GitHub Actions cron is UTC-only. We schedule both 02:00 UTC and 03:00 UTC,
  # then gate execution to 04:00 Europe/Berlin so the workflow runs once per day
  # at 04:00 local time across DST changes.
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Run full pipeline with AI synthesis — estimated cost ~€0.03–0.05 per run (5 Grok API calls via xAI)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ENABLE_NEWS_CATALYST_SCANNER: "true"

jobs:
  berlin-schedule-guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.berlin-time.outputs.should_run }}

    steps:
      - name: Check Berlin local time
        id: berlin-time
        run: |
          BERLIN_HOUR=$(TZ=Europe/Berlin date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$BERLIN_HOUR" = "04" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  run-pipeline:
    needs: berlin-schedule-guard
    if: ${{ needs.berlin-schedule-guard.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        run: echo "PIPELINE_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set cache date key
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache iShares constituent files
        uses: actions/cache@v4
        with:
          path: data/universe_cache
          key: universe-cache-${{ steps.date.outputs.today }}
          restore-keys: |
            universe-cache-

      - name: Run master pipeline
        run: |
          set -o pipefail
          mkdir -p logs
          echo "Running full pipeline with AI synthesis (~€0.03)"
          bash run_master.sh 2>&1 | tee logs/pipeline_report.txt
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}

      - name: Upload report to Supabase
        if: always()
        run: python3 scripts/upload_pipeline_report.py --run-id "${{ github.run_id }}" --conclusion "${{ job.status }}" --workflow "Daily Signal Pipeline (AI)"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Notify Telegram
        if: always()
        run: |
          python3 scripts/notify_pipeline_result.py \
            --status "${{ job.status }}" \
            --workflow "Daily Signal Pipeline (AI)" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --duration-min "$(echo "scale=1; ($(date +%s) - ${PIPELINE_START:-$(date +%s)}) / 60" | bc)"
        env:
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
